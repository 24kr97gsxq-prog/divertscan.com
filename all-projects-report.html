<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080f14">
<title>DivertScan — All Projects Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg-deep:#080f14;--bg-card:#0d1a24;--bg-card-hover:#122231;--bg-input:#0a1520;
    --border:#1a3044;--border-focus:#00c9a7;
    --text:#e2e8f0;--text-muted:#94a3b8;--text-dim:#64748b;
    --primary:#00c9a7;--primary-glow:rgba(0,201,167,.08);
    --success:#22c55e;--success-glow:rgba(34,197,94,.08);--success-light:rgba(34,197,94,.12);
    --warning:#f59e0b;--warning-glow:rgba(245,158,11,.08);--warning-light:rgba(245,158,11,.12);
    --danger:#ef4444;--danger-glow:rgba(239,68,68,.08);--danger-light:rgba(239,68,68,.12);
    --radius:10px;
    --font:'DM Sans',system-ui,sans-serif;
    --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.back-bar{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0f2b3c 0%,#0a1f2e 100%);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.back-bar a{display:inline-flex;align-items:center;gap:6px;color:var(--primary);text-decoration:none;font-size:.85rem;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,201,167,.06)}
.back-bar a:active{background:rgba(0,201,167,.15);transform:scale(.97)}
.back-bar .title{font-size:.75rem;color:var(--text-muted);margin-left:auto}
.header{padding:14px 16px 10px;text-align:center;border-bottom:1px solid var(--border)}
.header h1{font-size:1.1rem;font-weight:700}.header h1 span{color:var(--primary)}
.header .sub{font-size:.6rem;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.container{max-width:960px;margin:0 auto;padding:12px;padding-bottom:120px}
.grand-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.grand-stat{background:var(--bg-card);border-radius:8px;padding:10px 8px;text-align:center;border:1px solid var(--border)}
.grand-stat .val{font-size:1.25rem;font-weight:800;line-height:1.1;font-family:var(--mono)}
.grand-stat .lbl{font-size:.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.grand-stat.highlight{border-color:var(--success);background:var(--success-glow)}
.proj-card{background:var(--bg-card);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:background .15s}
.proj-card:active{background:var(--bg-card-hover)}
.co2-footer{margin-top:14px;padding:14px;background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(0,201,167,0.08));border-radius:var(--radius);border:1px solid rgba(34,197,94,0.2);text-align:center}
.co2-footer .big{font-size:1.6rem;font-weight:800;color:var(--success)}
.co2-footer .lbl{font-size:.65rem;color:var(--text-muted);margin-top:2px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),transparent);opacity:.6}
.card-title{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.export-bar{display:flex;gap:8px;margin-top:14px}
.btn-export{flex:1;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.btn-export:active{transform:scale(.97);background:var(--bg-card-hover)}
.btn-export.primary{background:var(--primary);color:#080f14;border-color:var(--primary)}
.loading{text-align:center;padding:40px 20px;color:var(--text-muted)}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media print{
    .back-bar,.export-bar,.no-print{display:none!important}
    body{background:#fff;color:#222;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .header{background:#fff;border-bottom:2px solid #059669;padding:20px 0}
    .header h1{color:#18181b;font-size:1.4rem}.header h1 span{color:#059669}
    .header .sub{color:#71717a}
    .container{padding:0}
    .grand-stat{background:#f4f4f5;border:1px solid #d4d4d8}
    .grand-stat .val{color:#18181b}.grand-stat.highlight{background:#ecfdf5;border-color:#059669}
    .proj-card{background:#fff;border:1px solid #d4d4d8;page-break-inside:avoid;margin-bottom:12px}
    .co2-footer{background:#ecfdf5;border:1px solid #059669}
    .co2-footer .big{color:#059669}
    .card{background:#fff;border:1px solid #d4d4d8;page-break-inside:avoid}
    .card::before{background:linear-gradient(90deg,#059669,transparent)}
    .print-footer{display:block!important;text-align:center;font-size:10px;color:#a1a1aa;margin-top:20px;padding-top:10px;border-top:1px solid #d4d4d8}
}
.print-footer{display:none}
</style>
</head>
<body>
<div class="back-bar no-print">
    <a href="index.html">&larr; Back to DivertScan</a>
    <span class="title">All Projects Portfolio</span>
</div>
<div class="header">
    <h1><span>Dalmex</span> Recycling &mdash; Portfolio</h1>
    <div class="sub">All Projects &bull; Performance Overview &bull; LEED MRp2</div>
</div>
<div class="container">
    <div id="portfolioContent">
        <div class="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:.8rem">Loading all projects...</div></div>
    </div>
</div>
<script>
(function(){
'use strict';
var SUPABASE_URL=localStorage.getItem('ds_supabase_url')||'https://cyvvlngtojagfoaitoog.supabase.co';
var SUPABASE_KEY=localStorage.getItem('ds_supabase_key')||'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5dnZsbmd0b2phZ2ZvYWl0b29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyODk4OTAsImV4cCI6MjA4NDg2NTg5MH0.CltpTET2wFfl5kaHFOGmUS8tR8bRFCjbtWDdVrC5r0g';
var MATERIALS={wood:{name:'Wood/Lumber',icon:'\u{1FAB5}',color:'#92400e'},plastic:{name:'Plastics',icon:'\u267B\uFE0F',color:'#fbbf24'},occ:{name:'Cardboard/OCC',icon:'\u{1F4E6}',color:'#d97706'},metal:{name:'Steel/Metal',icon:'\u{1F529}',color:'#6b7280'},concrete:{name:'Concrete',icon:'\u{1F9F1}',color:'#78716c'},block:{name:'Block/Brick',icon:'\u{1F9F1}',color:'#a16207'},landfill:{name:'Landfill',icon:'\u{1F5D1}\uFE0F',color:'#ef4444'}};
var matKeys=Object.keys(MATERIALS);
async function sb(ep){try{var r=await fetch(SUPABASE_URL+'/rest/v1/'+ep,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Accept':'application/json'}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function pc(p){return p>=50?'var(--success)':p>=25?'var(--warning)':'var(--danger)';}
function pb(p){return p>=50?'var(--success-light)':p>=25?'var(--warning-light)':'var(--danger-light)';}
function pl(p){return p>=75?'\u{1F3C6} Excellent':p>=50?'\u2705 On Track':p>=25?'\u26A0\uFE0F Below Target':'\u{1F534} Critical';}
function aa(d){if(!d)return{label:'No activity',dot:'var(--text-dim)'};var days=Math.floor((new Date()-new Date(d))/864e5);if(days<=7)return{label:days===0?'Today':days+'d ago',dot:'var(--success)'};if(days<=30)return{label:Math.floor(days/7)+'w ago',dot:'var(--warning)'};return{label:Math.floor(days/30)+'mo ago',dot:'var(--danger)'};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var PD=[];
async function load(){
var projects=await sb('projects?select=id,name,waste_hauler,leed_version,leed_target,location,client,general_contractor&order=name.asc');
var tickets=await sb('tickets?select=id,project_id,ticket_date,net_tons,diverted_tons,landfill_tons,diversion_pct,co2e_avoided,hauler,wood_tons,occ_tons,metal_tons,plastic_tons,concrete_tons,block_tons,gypsum_tons,landfill_pct&order=ticket_date.desc&limit=5000');
if(!projects){document.getElementById('portfolioContent').innerHTML='<div style="text-align:center;padding:40px;color:var(--danger);">\u26A0\uFE0F Could not connect.<br><br><a href="index.html" style="color:var(--primary)">\u2190 Back</a></div>';return;}
if(!tickets)tickets=[];
var pm={};
projects.forEach(function(p){pm[p.id]={id:p.id,name:p.name||'Untitled',hauler:p.waste_hauler||'',leed:p.leed_version||'v4',target:p.leed_target||50,tc:0,tt:0,dt:0,lt:0,dp:0,co:0,ld:null,mt:{}};matKeys.forEach(function(k){pm[p.id].mt[k]=0;});});
var md={};
tickets.forEach(function(t){var p=pm[t.project_id];if(!p)return;p.tc++;p.tt+=parseFloat(t.net_tons)||0;p.dt+=parseFloat(t.diverted_tons)||0;p.lt+=parseFloat(t.landfill_tons)||0;p.co+=parseFloat(t.co2e_avoided)||0;if(!p.hauler&&t.hauler)p.hauler=t.hauler;if(t.ticket_date&&(!p.ld||t.ticket_date>p.ld))p.ld=t.ticket_date;matKeys.forEach(function(k){p.mt[k]+=parseFloat(t[k+'_tons'])||0;});var mk=(t.ticket_date||'').substring(0,7);if(mk.length>=7){if(!md[mk])md[mk]={t:0,d:0,c:0};md[mk].t+=parseFloat(t.net_tons)||0;md[mk].d+=parseFloat(t.diverted_tons)||0;md[mk].c++;}});
PD=[];Object.keys(pm).forEach(function(id){var p=pm[id];if(p.tt>0)p.dp=(p.dt/p.tt)*100;PD.push(p);});PD.sort(function(a,b){return b.tt-a.tt;});
var tTk=0,tTn=0,tDv=0,tCo=0,gm={};matKeys.forEach(function(k){gm[k]=0;});
PD.forEach(function(p){tTk+=p.tc;tTn+=p.tt;tDv+=p.dt;tCo+=p.co;matKeys.forEach(function(k){gm[k]+=p.mt[k];});});
var od=tTn>0?(tDv/tTn*100):0;var ap=PD.filter(function(p){return p.tc>0;});
var el=document.getElementById('portfolioContent');var h='';
h+='<div class="grand-bar">';
h+='<div class="grand-stat"><div class="val">'+ap.length+'</div><div class="lbl">Active Projects</div></div>';
h+='<div class="grand-stat"><div class="val">'+tTk+'</div><div class="lbl">Tickets</div></div>';
h+='<div class="grand-stat"><div class="val">'+tTn.toFixed(1)+'</div><div class="lbl">Total Tons</div></div>';
h+='<div class="grand-stat highlight"><div class="val">'+od.toFixed(1)+'%</div><div class="lbl">Diversion</div></div>';
h+='</div>';
PD.forEach(function(p){if(p.tc===0)return;var c=pc(p.dp);var b=pb(p.dp);var a=aa(p.ld);var l=pl(p.dp);
h+='<div class="proj-card" style="border-left:4px solid '+c+'">';
h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
h+='<div style="font-weight:700;font-size:.9rem;flex:1;line-height:1.2">'+esc(p.name)+'</div>';
h+='<div style="font-size:.55rem;padding:3px 8px;border-radius:12px;font-weight:700;white-space:nowrap;margin-left:8px;background:'+b+';color:'+c+'">'+l+'</div></div>';
h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center">';
h+='<div><div style="font-size:.95rem;font-weight:700;font-family:var(--mono)">'+p.tc+'</div><div style="font-size:.5rem;color:var(--text-dim);text-transform:uppercase">Tickets</div></div>';
h+='<div><div style="font-size:.95rem;font-weight:700;font-family:var(--mono)">'+p.tt.toFixed(1)+'</div><div style="font-size:.5rem;color:var(--text-dim);text-transform:uppercase">Net Tons</div></div>';
h+='<div><div style="font-size:.95rem;font-weight:700;font-family:var(--mono);color:var(--success)">'+p.dt.toFixed(1)+'</div><div style="font-size:.5rem;color:var(--text-dim);text-transform:uppercase">Diverted</div></div>';
h+='<div><div style="font-size:.95rem;font-weight:700;font-family:var(--mono);color:var(--warning)">'+p.co.toFixed(1)+'</div><div style="font-size:.5rem;color:var(--text-dim);text-transform:uppercase">CO\u2082e</div></div>';
h+='</div>';
h+='<div style="display:flex;align-items:center;gap:8px;margin-top:10px"><div style="flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.min(p.dp,100)+'%;background:'+c+';border-radius:3px"></div></div><div style="font-size:.75rem;font-weight:700;color:'+c+';min-width:42px;text-align:right">'+p.dp.toFixed(1)+'%</div></div>';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04)">';
h+='<div style="font-size:.6rem;color:var(--text-dim)"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+a.dot+';margin-right:4px"></span>'+a.label+'</div>';
if(p.hauler)h+='<div style="font-size:.6rem;color:var(--text-muted);background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:10px">\u{1F69B} '+esc(p.hauler)+'</div>';
h+='</div></div>';});
var ep=PD.filter(function(p){return p.tc===0;});
if(ep.length>0)h+='<div style="font-size:.65rem;color:var(--text-dim);padding:8px 0;margin-top:4px">'+ep.length+' empty project'+(ep.length>1?'s':'')+': '+ep.map(function(p){return esc(p.name);}).join(', ')+'</div>';
h+='<div class="co2-footer"><div class="big">'+tCo.toFixed(1)+' mt</div><div class="lbl">Total CO\u2082e Avoided \u2014 All Projects Combined</div></div>';
var ms=matKeys.filter(function(k){return gm[k]>0.001;}).sort(function(a,b){return gm[b]-gm[a];});
if(ms.length>0){h+='<div class="card" style="margin-top:10px"><div class="card-title"><span style="font-size:1rem">\u{1F9F1}</span> Material Breakdown \u2014 All Projects</div>';
ms.forEach(function(k){var pct=tTn>0?(gm[k]/tTn*100):0;h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:.85rem;width:24px;text-align:center">'+MATERIALS[k].icon+'</span><span style="width:70px;font-size:.75rem;font-weight:600">'+MATERIALS[k].name.split('/')[0]+'</span><div style="flex:1;height:16px;background:rgba(255,255,255,0.05);border-radius:8px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct*1.5,100)+'%;background:'+MATERIALS[k].color+';border-radius:8px"></div></div><span style="font-size:.75rem;font-weight:700;min-width:50px;text-align:right">'+gm[k].toFixed(1)+'T</span><span style="font-size:.6rem;color:var(--text-dim);min-width:32px;text-align:right">'+pct.toFixed(0)+'%</span></div>';});h+='</div>';}
var sm=Object.keys(md).sort();
if(sm.length>1){h+='<div class="card" style="margin-top:10px"><div class="card-title"><span style="font-size:1rem">\u{1F4C8}</span> Monthly Trend</div><div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;font-size:.7rem;border-collapse:collapse"><tr style="border-bottom:2px solid var(--border);color:var(--text-muted)"><th style="text-align:left;padding:6px 4px">Month</th><th style="text-align:right;padding:6px 4px">Tickets</th><th style="text-align:right;padding:6px 4px">Tons</th><th style="text-align:right;padding:6px 4px">Diverted</th><th style="text-align:right;padding:6px 4px">Landfill</th><th style="text-align:right;padding:6px 4px">Div%</th></tr>';
sm.forEach(function(mk){var m=md[mk];var mr=m.t>0?Math.round(m.d/m.t*100):0;var lf=m.t-m.d;var rc=mr>=75?'var(--success)':(mr>=50?'var(--warning)':'var(--danger)');h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 4px;font-weight:600">'+mk+'</td><td style="padding:6px 4px;text-align:right">'+m.c+'</td><td style="padding:6px 4px;text-align:right">'+m.t.toFixed(1)+'</td><td style="padding:6px 4px;text-align:right;color:var(--success)">'+m.d.toFixed(1)+'</td><td style="padding:6px 4px;text-align:right;color:var(--danger)">'+lf.toFixed(1)+'</td><td style="padding:6px 4px;text-align:right;font-weight:700;color:'+rc+'">'+mr+'%</td></tr>';});
h+='<tr style="border-top:2px solid var(--primary);font-weight:700"><td style="padding:6px 4px">TOTALS</td><td style="padding:6px 4px;text-align:right">'+tTk+'</td><td style="padding:6px 4px;text-align:right">'+tTn.toFixed(1)+'</td><td style="padding:6px 4px;text-align:right;color:var(--success)">'+tDv.toFixed(1)+'</td><td style="padding:6px 4px;text-align:right;color:var(--danger)">'+(tTn-tDv).toFixed(1)+'</td><td style="padding:6px 4px;text-align:right;color:var(--primary)">'+od.toFixed(0)+'%</td></tr></table></div></div>';}
h+='<div class="export-bar no-print"><button class="btn-export primary" onclick="xPDF()">\u{1F4C4} Save as PDF</button><button class="btn-export" onclick="xCSV()">\u{1F4CA} Export CSV</button></div>';
h+='<div class="print-footer">Dalmex Recycling LLC \u2022 TCEQ RN103219481 \u2022 (214) 352-2000 \u2022 robert@dalmexrecycling.com \u2022 DivertScan \u2022 '+new Date().toLocaleDateString()+'</div>';
el.innerHTML=h;}
window.xPDF=function(){window.print();};
window.xCSV=function(){var hd=['Project','Tickets','Net Tons','Diverted Tons','Landfill Tons','Diversion %','CO2e (mt)','Hauler','Last Activity'];var rows=[hd.join(',')];PD.forEach(function(p){if(p.tc===0)return;rows.push(['"'+(p.name||'').replace(/"/g,'""')+'"',p.tc,p.tt.toFixed(2),p.dt.toFixed(2),p.lt.toFixed(2),p.dp.toFixed(1),p.co.toFixed(2),'"'+(p.hauler||'').replace(/"/g,'""')+'"',p.ld||''].join(','));});var bl=new Blob([rows.join('\n')],{type:'text/csv'});var u=URL.createObjectURL(bl);var a=document.createElement('a');a.href=u;a.download='DivertScan_Portfolio_'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);};
load();
})();
</script>
</body>
</html>
