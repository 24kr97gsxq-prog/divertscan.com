<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivertScan - Scale Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #0d7a3e; --green-light: #e8f5ee;
            --blue: #1a5fa8; --blue-light: #e6f0fa;
            --red: #c0392b; --red-light: #fde8e8;
            --orange: #e67e22; --orange-light: #fef3e2;
            --gray-50: #f8f9fa; --gray-100: #f0f1f3; --gray-200: #dcdee2;
            --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827;
            --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--gray-900); color: white; min-height: 100vh; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #000; }
        .top-bar h1 { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
        .top-bar .live { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .top-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .facility-bar { padding: 8px 20px; background: var(--gray-700); font-size: 13px; display: flex; justify-content: space-between; }
        .facility-bar .name { font-weight: 600; }
        .facility-bar .time { opacity: 0.7; }

        .main { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        /* Live weight section */
        .live-weight { background: var(--gray-700); border-radius: var(--radius); padding: 24px; text-align: center; }
        .live-weight .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; }
        .live-weight .weight { font-size: 64px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
        .live-weight .weight.empty { opacity: 0.2; }
        .live-weight .unit { font-size: 20px; opacity: 0.5; margin-left: 4px; }
        .live-weight .status-line { margin-top: 8px; font-size: 13px; opacity: 0.6; }

        /* Pending confirmation card */
        .pending-card { background: var(--orange); border-radius: var(--radius); padding: 20px; color: white; }
        .pending-card.empty { background: var(--gray-700); opacity: 0.5; }
        .pending-card h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .pending-card .weight-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .pending-card .weight-row .label { font-size: 13px; opacity: 0.8; }
        .pending-card .weight-row .value { font-size: 18px; font-weight: 700; }
        .pending-card .net-row { border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px; margin-top: 4px; }
        .pending-card .net-row .value { font-size: 24px; }

        .confirm-section { margin-top: 12px; display: flex; gap: 8px; }
        .confirm-section select {
            flex: 1; padding: 12px; font-size: 16px; font-weight: 500; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px; background: rgba(255,255,255,0.15); color: white; appearance: none; -webkit-appearance: none;
        }
        .confirm-section select option { color: var(--gray-900); background: white; }
        .confirm-section button {
            padding: 12px 24px; font-size: 16px; font-weight: 700; border: none; border-radius: 8px;
            background: white; color: var(--orange); cursor: pointer; text-transform: uppercase; white-space: nowrap;
        }
        .confirm-section button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Recent tickets */
        .recent { background: var(--gray-700); border-radius: var(--radius); padding: 16px; }
        .recent h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; opacity: 0.7; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ticket-row:last-child { border-bottom: none; }
        .ticket-row .left { }
        .ticket-row .tknum { font-size: 14px; font-weight: 600; }
        .ticket-row .tkinfo { font-size: 12px; opacity: 0.5; margin-top: 2px; }
        .ticket-row .right { text-align: right; }
        .ticket-row .tkweight { font-size: 16px; font-weight: 700; }
        .ticket-row .tkstatus { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .ticket-row .tkstatus.confirmed { color: #22c55e; }
        .ticket-row .tkstatus.pending { color: var(--orange); }

        .empty-state { text-align: center; padding: 24px; opacity: 0.4; font-size: 14px; }

        /* Test button */
        .test-section { text-align: center; padding: 8px; }
        .test-btn { padding: 8px 16px; font-size: 12px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>DIVERTSCAN SCALE BOARD</h1>
        <div class="live"><div class="dot" id="liveDot"></div><span id="liveText">LIVE</span></div>
    </div>
    <div class="facility-bar">
        <span class="name">Dalmex Recycling</span>
        <span class="time" id="clock"></span>
    </div>

    <div class="main">
        <!-- Live Weight Display -->
        <div class="live-weight">
            <div class="label">Current Scale Reading</div>
            <div class="weight" id="liveWt">--<span class="unit">lbs</span></div>
            <div class="status-line" id="liveStatus">Waiting for activity</div>
        </div>

        <!-- Pending Confirmation -->
        <div class="pending-card empty" id="pendingCard">
            <h3 id="pendingTitle">No Pending Tickets</h3>
            <div id="pendingBody" style="display:none;">
                <div class="weight-row"><span class="label">Gross</span><span class="value" id="pGross">--</span></div>
                <div class="weight-row"><span class="label">Tare</span><span class="value" id="pTare">--</span></div>
                <div class="weight-row net-row"><span class="label">Net</span><span class="value" id="pNet">--</span></div>
                <div class="confirm-section">
                    <select id="pProj"><option value="">Project...</option></select>
                    <button id="pBtn" disabled onclick="confirmFromBoard()">CONFIRM</button>
                </div>
            </div>
        </div>

        <!-- Recent Tickets -->
        <div class="recent">
            <h3>Recent Tickets Today</h3>
            <div id="recentList"><div class="empty-state">No tickets yet today</div></div>
        </div>

        <!-- Test Mode -->
        <div class="test-section" id="testSection" style="display:none;">
            <button class="test-btn" onclick="simulateTest()">Insert Test Weights</button>
        </div>
    </div>

    <script>
        var SB = "https://cyvvlngtojagfoaitoog.supabase.co";
        var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5dnZsbmd0b2phZ2ZvYWl0b29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyODk4OTAsImV4cCI6MjA4NDg2NTg5MH0.CltpTET2wFfl5kaHFOGmUS8tR8bRFCjbtWDdVrC5r0g";
        var DEV = "dalmex-scale-01";
        var HAUL = "Dalmex Recycling";
        var FAC = "Dalmex Recycling";

        var gr = null, tr = null, projects = [];
        var isTest = window.location.search.indexOf("test") !== -1;

        function sf(path, opt) {
            opt = opt || {};
            return fetch(SB + "/rest/v1/" + path, {
                method: opt.method || "GET",
                headers: { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json", "Prefer": opt.prefer || "return=representation" },
                body: opt.body || undefined
            }).then(function(r) {
                if (!r.ok) return r.text().then(function(e) { throw new Error(r.status + ": " + e); });
                return r.text().then(function(t) { return t ? JSON.parse(t) : null; });
            });
        }

        function init() {
            if (isTest) document.getElementById("testSection").style.display = "block";

            sf("projects?select=id,name&order=name.asc").then(function(d) {
                projects = d;
                var s = document.getElementById("pProj");
                d.forEach(function(p) { var o = document.createElement("option"); o.value = p.id; o.textContent = p.name; s.appendChild(o); });
            });

            document.getElementById("pProj").addEventListener("change", function() {
                document.getElementById("pBtn").disabled = !this.value;
            });

            updateClock();
            setInterval(updateClock, 1000);
            pollAll();
            setInterval(pollAll, 2000);
        }

        function updateClock() {
            document.getElementById("clock").textContent = new Date().toLocaleTimeString();
        }

        function pollAll() {
            pollPending();
            pollRecent();
        }

        function pollPending() {
            sf("scale_weights?device_id=eq." + DEV + "&status=eq.pending&order=captured_at.desc&limit=2")
            .then(function(w) {
                document.getElementById("liveDot").style.background = "#22c55e";
                document.getElementById("liveText").textContent = "LIVE";

                if (w.length === 0) {
                    gr = null; tr = null;
                    document.getElementById("liveWt").innerHTML = '--<span class="unit">lbs</span>';
                    document.getElementById("liveWt").classList.add("empty");
                    document.getElementById("liveStatus").textContent = "Waiting for activity";
                    document.getElementById("pendingCard").classList.add("empty");
                    document.getElementById("pendingTitle").textContent = "No Pending Tickets";
                    document.getElementById("pendingBody").style.display = "none";
                    return;
                }

                // Show latest weight on the big display
                document.getElementById("liveWt").innerHTML = Number(w[0].weight_lbs).toLocaleString() + '<span class="unit">lbs</span>';
                document.getElementById("liveWt").classList.remove("empty");

                if (w.length >= 2) {
                    var sorted = w.slice().sort(function(a, b) { return b.weight_lbs - a.weight_lbs; });
                    gr = sorted[0]; tr = sorted[1];
                    var net = Math.abs(gr.weight_lbs - tr.weight_lbs);

                    document.getElementById("liveStatus").textContent = "Gross + Tare captured - ready to confirm";
                    document.getElementById("pendingCard").classList.remove("empty");
                    document.getElementById("pendingTitle").textContent = "Pending Confirmation";
                    document.getElementById("pendingBody").style.display = "block";
                    document.getElementById("pGross").textContent = Number(gr.weight_lbs).toLocaleString() + " lbs";
                    document.getElementById("pTare").textContent = Number(tr.weight_lbs).toLocaleString() + " lbs";
                    document.getElementById("pNet").textContent = Number(net).toLocaleString() + " lbs";
                } else {
                    gr = w[0]; tr = null;
                    document.getElementById("liveStatus").textContent = "Gross captured - waiting for tare";
                    document.getElementById("pendingCard").classList.remove("empty");
                    document.getElementById("pendingTitle").textContent = "Waiting for Tare Weight";
                    document.getElementById("pendingBody").style.display = "none";
                }
            })
            .catch(function() {
                document.getElementById("liveDot").style.background = "#ef4444";
                document.getElementById("liveText").textContent = "OFFLINE";
            });
        }

        function pollRecent() {
            var today = new Date().toISOString().split("T")[0];
            sf("tickets?select=id,ticket_number,ticket_date,gross_lbs,tare_lbs,net_lbs,net_tons,hauler,scan_type,project_id&ticket_date=eq." + today + "&order=created_at.desc&limit=10")
            .then(function(tickets) {
                var list = document.getElementById("recentList");
                if (!tickets || tickets.length === 0) {
                    list.innerHTML = '<div class="empty-state">No tickets yet today</div>';
                    return;
                }
                var html = "";
                tickets.forEach(function(t) {
                    var projName = "Unknown";
                    projects.forEach(function(p) { if (p.id === t.project_id) projName = p.name; });
                    html += '<div class="ticket-row">';
                    html += '<div class="left"><div class="tknum">Ticket #' + t.ticket_number + '</div>';
                    html += '<div class="tkinfo">' + projName + ' &middot; ' + (t.hauler || HAUL) + '</div></div>';
                    html += '<div class="right"><div class="tkweight">' + Number(t.net_lbs).toLocaleString() + ' lbs</div>';
                    html += '<div class="tkstatus confirmed">Confirmed</div></div>';
                    html += '</div>';
                });
                list.innerHTML = html;
            });
        }

        function confirmFromBoard() {
            if (!gr || !tr) return;
            var btn = document.getElementById("pBtn");
            btn.disabled = true; btn.textContent = "...";
            var pid = document.getElementById("pProj").value;
            var gl = Number(gr.weight_lbs), tl = Number(tr.weight_lbs);
            var nl = Math.abs(gl - tl), nt = nl / 2000;
            var now = new Date().toISOString(), today = now.split("T")[0];

            sf("tickets?select=ticket_number&order=ticket_number.desc&limit=1").then(function(r) {
                var tn = "SC" + Date.now().toString().slice(-8);
                if (r && r.length > 0 && r[0].ticket_number) { var ln = parseInt(r[0].ticket_number); if (!isNaN(ln)) tn = String(ln + 1); }
                return sf("tickets", { method: "POST", body: JSON.stringify({
                    project_id: pid, ticket_number: tn, ticket_date: today,
                    gross_lbs: gl, tare_lbs: tl, net_lbs: nl, net_tons: parseFloat(nt.toFixed(2)),
                    hauler: HAUL, scan_type: "scale_capture", material_breakdown: {}, diversion_rate: 0, created_at: now
                }), prefer: "return=representation" }).then(function(tk) {
                    var tid = (tk && tk[0]) ? tk[0].id : null;
                    return Promise.all([
                        sf("scale_weights?id=eq." + gr.id, { method: "PATCH", body: JSON.stringify({ status: "confirmed", project_id: pid, confirmed_at: now, weight_type: "gross", paired_with: tr.id, ticket_id: tid }), prefer: "return=minimal" }),
                        sf("scale_weights?id=eq." + tr.id, { method: "PATCH", body: JSON.stringify({ status: "confirmed", project_id: pid, confirmed_at: now, weight_type: "tare", paired_with: gr.id, ticket_id: tid }), prefer: "return=minimal" })
                    ]);
                });
            }).then(function() {
                gr = null; tr = null;
                document.getElementById("pProj").value = "";
                btn.textContent = "CONFIRM"; btn.disabled = true;
                pollAll();
            }).catch(function(e) {
                console.error(e); btn.textContent = "CONFIRM"; btn.disabled = false;
            });
        }

        function simulateTest() {
            var now = new Date().toISOString();
            var ago = new Date(Date.now() - 5 * 60000).toISOString();
            Promise.all([
                sf("scale_weights", { method: "POST", body: JSON.stringify({ captured_at: ago, weight_lbs: 48200, weight_type: "unknown", device_id: DEV, facility: FAC, sha256_hash: "board_test_g_" + Date.now(), status: "pending", source: "test" }), prefer: "return=minimal" }),
                sf("scale_weights", { method: "POST", body: JSON.stringify({ captured_at: now, weight_lbs: 16400, weight_type: "unknown", device_id: DEV, facility: FAC, sha256_hash: "board_test_t_" + Date.now(), status: "pending", source: "test" }), prefer: "return=minimal" })
            ]);
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
